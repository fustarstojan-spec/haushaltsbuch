<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haushaltsbuch</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F2ED;
    --surface: #FDFCFA;
    --ink: #1A1714;
    --ink-2: #6B6660;
    --ink-3: #A09C97;
    --accent: #2D5A3D;
    --accent-light: #E8F0EA;
    --danger: #8B2E2E;
    --danger-light: #F5EAEA;
    --border: #E2DDD8;
    --serif: 'DM Serif Display', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }

  body { font-family: var(--sans); background: var(--bg); color: var(--ink); min-height: 100vh; font-size: 15px; line-height: 1.6; }

  .app { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* HEADER */
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1.5px solid var(--border); flex-wrap: wrap; gap: 1rem; }
  header h1 { font-family: var(--serif); font-size: 2.2rem; font-weight: 400; letter-spacing: -0.02em; }
  .header-right { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
  .month-nav { display: flex; align-items: center; gap: 0.75rem; }
  .month-nav button { background: none; border: 1px solid var(--border); border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 1rem; color: var(--ink-2); display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .month-nav button:hover { background: var(--surface); color: var(--ink); }
  #month-label { font-weight: 500; font-size: 1rem; min-width: 140px; text-align: center; }

  /* AUTH */
  .auth-btn { display: flex; align-items: center; gap: 0.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.45rem 0.9rem; font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; color: var(--ink-2); transition: all 0.15s; }
  .auth-btn:hover { border-color: var(--ink-3); color: var(--ink); }
  .auth-btn.connected { color: var(--accent); border-color: var(--accent-light); background: var(--accent-light); }
  .sync-status { font-size: 12px; color: var(--ink-3); display: flex; align-items: center; gap: 0.4rem; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ink-3); display: inline-block; }
  .sync-dot.ok { background: var(--accent); }
  .sync-dot.err { background: var(--danger); }
  .sync-dot.spin { animation: pulse 1s infinite; background: #B8860B; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* SUMMARY */
  .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.2rem 1.4rem; }
  .card .label { font-size: 12px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 0.4rem; }
  .card .amount { font-family: var(--serif); font-size: 1.9rem; font-weight: 400; letter-spacing: -0.02em; }
  .card.income .amount { color: var(--accent); }
  .card.expense .amount { color: var(--danger); }

  /* FORM */
  .add-form { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.4rem; margin-bottom: 2rem; }
  .add-form h2 { font-family: var(--serif); font-size: 1.3rem; font-weight: 400; margin-bottom: 1rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr 2fr 1fr auto; gap: 0.75rem; align-items: end; }
  .field { display: flex; flex-direction: column; gap: 0.35rem; }
  .field label { font-size: 12px; font-weight: 500; color: var(--ink-2); letter-spacing: 0.04em; text-transform: uppercase; }
  input, select { font-family: var(--sans); font-size: 14px; color: var(--ink); background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 0.55rem 0.75rem; outline: none; transition: border-color 0.15s; width: 100%; }
  input:focus, select:focus { border-color: var(--accent); }
  .btn-add { background: var(--ink); color: white; border: none; border-radius: 8px; padding: 0.55rem 1.2rem; font-family: var(--sans); font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.15s; height: 38px; }
  .btn-add:hover { background: #333; }
  .btn-add:disabled { background: var(--ink-3); cursor: not-allowed; }

  .type-toggle { display: flex; margin-bottom: 1rem; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); width: fit-content; }
  .type-toggle button { background: none; border: none; padding: 0.45rem 1.1rem; font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; color: var(--ink-2); transition: all 0.15s; }
  .type-toggle button.active-income { background: var(--accent-light); color: var(--accent); }
  .type-toggle button.active-expense { background: var(--danger-light); color: var(--danger); }

  /* LIST */
  .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
  .tab { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 0.45rem 1rem; font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; color: var(--ink-2); transition: all 0.15s; }
  .tab.active { background: var(--ink); color: white; border-color: var(--ink); }

  .section-title { font-family: var(--serif); font-size: 1.3rem; font-weight: 400; margin-bottom: 1rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: baseline; }
  .section-title span { font-family: var(--sans); font-size: 13px; color: var(--ink-3); }

  .tx-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 2rem; }
  .tx-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.85rem 1.1rem; display: grid; grid-template-columns: 3fr 1.5fr 1fr 32px; align-items: center; gap: 1rem; transition: border-color 0.15s; }
  .tx-item:hover { border-color: var(--ink-3); }
  .tx-desc { font-weight: 500; font-size: 14px; }
  .tx-cat { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
  .tx-date { font-size: 12px; color: var(--ink-3); }
  .tx-amount { font-family: var(--serif); font-size: 1.15rem; text-align: right; }
  .tx-amount.income { color: var(--accent); }
  .tx-amount.expense { color: var(--danger); }
  .tx-del { background: none; border: 1px solid transparent; border-radius: 6px; color: var(--ink-3); cursor: pointer; padding: 4px; font-size: 13px; transition: all 0.15s; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
  .tx-del:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-light); }
  .empty { text-align: center; padding: 2.5rem; color: var(--ink-3); font-size: 14px; }

  /* CHART */
  .chart-section { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.4rem; }
  .chart-section h2 { font-family: var(--serif); font-size: 1.3rem; font-weight: 400; margin-bottom: 1.2rem; }
  .cat-bars { display: flex; flex-direction: column; gap: 0.85rem; }
  .cat-row { display: grid; grid-template-columns: 140px 1fr 90px; align-items: center; gap: 0.75rem; }
  .cat-name { font-size: 13px; color: var(--ink-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; background: var(--danger); transition: width 0.4s; }
  .cat-val { font-size: 13px; font-weight: 500; text-align: right; color: var(--ink-2); }
  .chart-empty { font-size: 14px; color: var(--ink-3); text-align: center; padding: 1rem; }

  /* LOGIN SCREEN */
  #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; gap: 1.5rem; }
  #login-screen h2 { font-family: var(--serif); font-size: 2rem; font-weight: 400; }
  #login-screen p { color: var(--ink-2); font-size: 14px; max-width: 400px; line-height: 1.7; }
  .big-btn { background: var(--ink); color: white; border: none; border-radius: 10px; padding: 0.8rem 2rem; font-family: var(--sans); font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .big-btn:hover { background: #333; }

  @media (max-width: 640px) {
    .summary { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr 1fr; }
    .form-row .btn-add { grid-column: span 2; }
    .tx-item { grid-template-columns: 1fr 80px 28px; }
    .tx-date { display: none; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- LOGIN -->
  <div id="login-screen">
    <h2>Haushaltsbuch</h2>
    <p>Melde dich mit deinem Google-Konto an, damit deine Daten geräteübergreifend gespeichert werden.</p>
    <button class="big-btn" onclick="signIn()">Mit Google anmelden</button>
  </div>

  <!-- MAIN APP (hidden until signed in) -->
  <div id="main-app" style="display:none">

    <header>
      <h1>Haushaltsbuch</h1>
      <div class="header-right">
        <div class="sync-status"><span class="sync-dot" id="sync-dot"></span><span id="sync-text">Nicht verbunden</span></div>
        <div class="month-nav">
          <button onclick="changeMonth(-1)">&#8592;</button>
          <div id="month-label"></div>
          <button onclick="changeMonth(1)">&#8594;</button>
        </div>
        <button class="auth-btn connected" onclick="signOut()">Abmelden</button>
      </div>
    </header>

    <div class="summary">
      <div class="card income"><div class="label">Einnahmen</div><div class="amount" id="sum-income">0,00 €</div></div>
      <div class="card expense"><div class="label">Ausgaben</div><div class="amount" id="sum-expense">0,00 €</div></div>
      <div class="card balance"><div class="label">Saldo</div><div class="amount" id="sum-balance">0,00 €</div></div>
    </div>

    <div class="add-form">
      <h2>Eintrag hinzufügen</h2>
      <div class="type-toggle">
        <button id="btn-income" class="active-income" onclick="setType('income')">+ Einnahme</button>
        <button id="btn-expense" onclick="setType('expense')">− Ausgabe</button>
      </div>
      <div class="form-row">
        <div class="field"><label>Betrag (€)</label><input type="number" id="f-amount" placeholder="0,00" min="0" step="0.01"></div>
        <div class="field"><label>Datum</label><input type="date" id="f-date"></div>
        <div class="field"><label>Beschreibung</label><input type="text" id="f-desc" placeholder="z. B. Gehalt, Miete…"></div>
        <div class="field"><label>Kategorie</label><select id="f-cat"></select></div>
        <button class="btn-add" id="add-btn" onclick="addEntry()">Hinzufügen</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('all', this)">Alle</button>
      <button class="tab" onclick="switchTab('income', this)">Einnahmen</button>
      <button class="tab" onclick="switchTab('expense', this)">Ausgaben</button>
    </div>

    <div class="section-title">Buchungen <span id="tx-count"></span></div>
    <div class="tx-list" id="tx-list"></div>

    <div class="chart-section">
      <h2>Ausgaben nach Kategorie</h2>
      <div class="cat-bars" id="cat-bars"><p class="chart-empty">Noch keine Ausgaben vorhanden.</p></div>
    </div>

  </div>
</div>

<!-- Google APIs -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
const CLIENT_ID    = '601703604971-p8j9c62s6cek5gdr0j950tbml98u1k1u.apps.googleusercontent.com';
const SHEET_ID     = '16OrmQYTRoU5nioBLOB1hp0C8YSKiznYmpz14D7kp_70';
const SCOPES       = 'https://www.googleapis.com/auth/spreadsheets';
const SHEET_NAME   = 'Eintraege';

const CATS = {
  income:  ['Gehalt','Nebeneinkommen','Rente','Kindergeld','Sonstiges'],
  expense: ['Miete & Nebenkosten','Lebensmittel','Mobilität','Versicherungen','Gesundheit','Freizeit','Kleidung','Bildung','Gastronomie','Sonstiges']
};

let accessToken = null;
let entries = [];
let currentType = 'income';
let currentTab  = 'all';
let currentYear, currentMonth;

// ── AUTH ──────────────────────────────────────────────
function signIn() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { alert('Anmeldung fehlgeschlagen: ' + resp.error); return; }
      accessToken = resp.access_token;
      showApp();
      await ensureSheet();
      await loadEntries();
    }
  });
  client.requestAccessToken();
}

function signOut() {
  google.accounts.oauth2.revoke(accessToken, () => {});
  accessToken = null;
  entries = [];
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-app').style.display = 'none';
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  const now = new Date();
  currentYear  = now.getFullYear();
  currentMonth = now.getMonth();
  document.getElementById('f-date').value = now.toISOString().slice(0,10);
  updateCatSelect();
  setSyncStatus('ok', 'Verbunden');
}

// ── SHEETS API ────────────────────────────────────────
async function sheetsGet(range) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}`;
  const r = await fetch(url, { headers: { Authorization: 'Bearer ' + accessToken } });
  return r.json();
}

async function sheetsAppend(values) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(SHEET_NAME)}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`;
  const r = await fetch(url, {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
    body: JSON.stringify({ values })
  });
  return r.json();
}

async function sheetsClear(range) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}:clear`;
  await fetch(url, { method: 'POST', headers: { Authorization: 'Bearer ' + accessToken } });
}

async function sheetsBatchUpdate(data) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values:batchUpdate`;
  const r = await fetch(url, {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
    body: JSON.stringify({ valueInputOption: 'RAW', data })
  });
  return r.json();
}

async function ensureSheet() {
  // Check if header row exists
  try {
    const data = await sheetsGet(`${SHEET_NAME}!A1:F1`);
    if (!data.values || data.values[0]?.[0] !== 'ID') {
      // Write header
      await sheetsBatchUpdate([{
        range: `${SHEET_NAME}!A1:F1`,
        values: [['ID','Typ','Betrag','Datum','Beschreibung','Kategorie']]
      }]);
    }
  } catch(e) {
    // Sheet tab might not exist — try creating it
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}:batchUpdate`, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ requests: [{ addSheet: { properties: { title: SHEET_NAME } } }] })
    });
    await sheetsBatchUpdate([{
      range: `${SHEET_NAME}!A1:F1`,
      values: [['ID','Typ','Betrag','Datum','Beschreibung','Kategorie']]
    }]);
  }
}

async function loadEntries() {
  setSyncStatus('spin', 'Lade…');
  try {
    const data = await sheetsGet(`${SHEET_NAME}!A2:F`);
    entries = (data.values || []).map(r => ({
      id:     r[0],
      type:   r[1],
      amount: parseFloat(r[2]) || 0,
      date:   r[3],
      desc:   r[4],
      cat:    r[5]
    })).filter(e => e.id);
    setSyncStatus('ok', 'Synchronisiert');
    render();
  } catch(e) {
    setSyncStatus('err', 'Fehler beim Laden');
    console.error(e);
  }
}

async function addEntry() {
  const amount = parseFloat(document.getElementById('f-amount').value);
  const date   = document.getElementById('f-date').value;
  const desc   = document.getElementById('f-desc').value.trim();
  const cat    = document.getElementById('f-cat').value;
  if (!amount || amount <= 0 || !date || !desc) { alert('Bitte alle Felder ausfüllen.'); return; }

  const id = Date.now().toString();
  const entry = { id, type: currentType, amount, date, desc, cat };

  document.getElementById('add-btn').disabled = true;
  setSyncStatus('spin', 'Speichere…');
  try {
    await sheetsAppend([[id, currentType, amount.toFixed(2), date, desc, cat]]);
    entries.push(entry);
    document.getElementById('f-amount').value = '';
    document.getElementById('f-desc').value = '';
    setSyncStatus('ok', 'Gespeichert');
    render();
  } catch(e) {
    setSyncStatus('err', 'Fehler beim Speichern');
    alert('Fehler beim Speichern. Bitte prüfe die Internetverbindung.');
  }
  document.getElementById('add-btn').disabled = false;
}

async function deleteEntry(id) {
  if (!confirm('Eintrag löschen?')) return;
  entries = entries.filter(e => e.id !== id);
  setSyncStatus('spin', 'Aktualisiere…');
  try {
    // Rewrite all data
    await sheetsClear(`${SHEET_NAME}!A2:F`);
    if (entries.length) {
      await sheetsAppend(entries.map(e => [e.id, e.type, parseFloat(e.amount).toFixed(2), e.date, e.desc, e.cat]));
    }
    setSyncStatus('ok', 'Gespeichert');
    render();
  } catch(e) {
    setSyncStatus('err', 'Fehler beim Löschen');
    await loadEntries();
  }
}

// ── UI HELPERS ─────────────────────────────────────────
function setSyncStatus(state, text) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot ' + state;
  document.getElementById('sync-text').textContent = text;
}

function fmt(n) {
  return n.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
}

function setType(t) {
  currentType = t;
  document.getElementById('btn-income').className  = t === 'income'  ? 'active-income'  : '';
  document.getElementById('btn-expense').className = t === 'expense' ? 'active-expense' : '';
  updateCatSelect();
}

function updateCatSelect() {
  const sel = document.getElementById('f-cat');
  sel.innerHTML = CATS[currentType].map(c => `<option>${c}</option>`).join('');
}

function changeMonth(d) {
  currentMonth += d;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  render();
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  const key = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
  const months = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  document.getElementById('month-label').textContent = `${months[currentMonth]} ${currentYear}`;

  const month = entries.filter(e => e.date && e.date.startsWith(key));
  const income  = month.filter(e => e.type === 'income').reduce((s,e)  => s + e.amount, 0);
  const expense = month.filter(e => e.type === 'expense').reduce((s,e) => s + e.amount, 0);

  document.getElementById('sum-income').textContent  = fmt(income);
  document.getElementById('sum-expense').textContent = fmt(expense);
  const bal = income - expense;
  const balEl = document.getElementById('sum-balance');
  balEl.textContent = fmt(Math.abs(bal));
  balEl.style.color = bal < 0 ? 'var(--danger)' : bal > 0 ? 'var(--accent)' : 'var(--ink)';

  let filtered = month;
  if (currentTab === 'income')  filtered = month.filter(e => e.type === 'income');
  if (currentTab === 'expense') filtered = month.filter(e => e.type === 'expense');
  filtered = [...filtered].sort((a,b) => b.date.localeCompare(a.date));

  document.getElementById('tx-count').textContent = filtered.length + ' Einträge';

  const list = document.getElementById('tx-list');
  list.innerHTML = filtered.length
    ? filtered.map(e => `
        <div class="tx-item">
          <div><div class="tx-desc">${e.desc}</div><div class="tx-cat">${e.cat}</div></div>
          <div class="tx-date">${new Date(e.date + 'T12:00:00').toLocaleDateString('de-DE')}</div>
          <div class="tx-amount ${e.type}">${e.type === 'income' ? '+' : '−'} ${fmt(e.amount)}</div>
          <button class="tx-del" onclick="deleteEntry('${e.id}')" title="Löschen">✕</button>
        </div>`).join('')
    : '<div class="empty">Keine Einträge in diesem Monat.</div>';

  // Chart
  const expEntries = month.filter(e => e.type === 'expense');
  const catMap = {};
  expEntries.forEach(e => { catMap[e.cat] = (catMap[e.cat] || 0) + e.amount; });
  const catSorted = Object.entries(catMap).sort((a,b) => b[1]-a[1]);
  const maxVal = catSorted.length ? catSorted[0][1] : 1;
  const bars = document.getElementById('cat-bars');
  bars.innerHTML = catSorted.length
    ? catSorted.map(([cat, val]) => `
        <div class="cat-row">
          <div class="cat-name" title="${cat}">${cat}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(val/maxVal*100).toFixed(1)}%"></div></div>
          <div class="cat-val">${fmt(val)}</div>
        </div>`).join('')
    : '<p class="chart-empty">Noch keine Ausgaben vorhanden.</p>';
}
</script>
</body>
</html>
